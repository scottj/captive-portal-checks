<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Captive Portal Checks</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Source+Sans+3:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #1b1b1f;
      --surface: #232328;
      --surface-raised: #2a2a30;
      --border: #35353d;
      --border-hi: #484852;
      --accent: #8b9e6b;
      --accent-dim: rgba(139,158,107,0.12);
      --accent-mid: rgba(139,158,107,0.25);
      --http-color: #c9955a;
      --http-bg: rgba(201,149,90,0.1);
      --https-color: #6b9e8b;
      --https-bg: rgba(107,158,139,0.1);
      --text: #a8a8b3;
      --text-dim: #65656f;
      --text-bright: #e0e0e6;
      --display: 'DM Serif Display', Georgia, serif;
      --body: 'Source Sans 3', system-ui, sans-serif;
      --mono: 'JetBrains Mono', monospace;
      --radius: 6px;
    }

    @media (prefers-color-scheme: light) {
      :root {
        --bg: #f5f3ef;
        --surface: #ffffff;
        --surface-raised: #fafaf8;
        --border: #e0ddd6;
        --border-hi: #ccc8be;
        --accent: #5c7a3a;
        --accent-dim: rgba(92,122,58,0.07);
        --accent-mid: rgba(92,122,58,0.18);
        --http-color: #a06b20;
        --http-bg: rgba(160,107,32,0.06);
        --https-color: #2e7a5e;
        --https-bg: rgba(46,122,94,0.06);
        --text: #4a4a52;
        --text-dim: #8a8a92;
        --text-bright: #1a1a20;
      }
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--body);
      font-weight: 400;
      min-height: 100vh;
      line-height: 1.6;
    }

    /* ── Header ── */
    header {
      padding: 3.5rem 2rem 2.5rem;
      max-width: 1080px;
      margin: 0 auto;
    }

    .header-top {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
      margin-bottom: 0.5rem;
    }

    h1 {
      font-family: var(--display);
      font-size: clamp(1.6rem, 4vw, 2.4rem);
      font-weight: 400;
      color: var(--text-bright);
      letter-spacing: -0.01em;
      line-height: 1.15;
    }

    .stats {
      display: flex;
      gap: 1.5rem;
      align-items: baseline;
    }

    .stat {
      font-family: var(--mono);
      font-size: 0.75rem;
      color: var(--text-dim);
    }

    .stat strong {
      color: var(--accent);
      font-weight: 500;
      font-size: 0.85rem;
    }

    .subtitle {
      font-size: 0.95rem;
      color: var(--text-dim);
      font-weight: 300;
      max-width: 48ch;
    }

    .header-rule {
      border: none;
      height: 1px;
      background: var(--border);
      margin-top: 2rem;
    }

    /* ── Controls ── */
    .controls {
      max-width: 1080px;
      margin: 0 auto;
      padding: 1.25rem 2rem;
      display: flex;
      gap: 0.75rem;
      align-items: center;
      flex-wrap: wrap;
    }

    .search-wrap {
      position: relative;
      flex: 1;
      min-width: 200px;
    }

    .search-wrap svg {
      position: absolute;
      left: 0.75rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-dim);
      pointer-events: none;
    }

    input[type="search"] {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text-bright);
      font-family: var(--body);
      font-size: 0.85rem;
      padding: 0.55rem 0.85rem 0.55rem 2.3rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input[type="search"]:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px var(--accent-dim);
    }

    input[type="search"]::placeholder { color: var(--text-dim); }

    .filter-chips {
      display: flex;
      gap: 0.35rem;
      flex-wrap: wrap;
    }

    .chip {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 100px;
      color: var(--text-dim);
      cursor: pointer;
      font-family: var(--body);
      font-size: 0.72rem;
      font-weight: 500;
      padding: 0.3rem 0.75rem;
      transition: all 0.15s;
      user-select: none;
      white-space: nowrap;
    }

    .chip:hover {
      border-color: var(--border-hi);
      color: var(--text);
    }

    .chip.active {
      background: var(--accent-dim);
      border-color: var(--accent);
      color: var(--accent);
    }

    /* ── Main ── */
    main {
      max-width: 1080px;
      margin: 0 auto 4rem;
      padding: 0 2rem;
    }

    #results-info {
      font-family: var(--mono);
      font-size: 0.7rem;
      color: var(--text-dim);
      margin-bottom: 0.75rem;
      min-height: 1.2em;
    }

    /* ── Cards ── */
    .card-list {
      columns: 2;
      column-gap: 0.75rem;
    }

    @media (max-width: 800px) {
      .card-list { columns: 1; }
    }

    .card {
      break-inside: avoid;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.5rem;
      margin-bottom: 0.75rem;
      transition: background 0.15s;
      animation: fadeIn 0.25s ease both;
    }

    .card:hover { background: var(--surface-raised); }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(4px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card-header {
      display: flex;
      align-items: baseline;
      gap: 0.75rem;
      margin-bottom: 0.75rem;
    }

    .card-vendor {
      font-family: var(--body);
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--text-bright);
    }

    .card-os {
      font-size: 0.78rem;
      color: var(--text-dim);
      font-weight: 400;
    }

    .card-os::before {
      content: '/';
      margin-right: 0.5rem;
      color: var(--border-hi);
    }

    .url-count {
      margin-left: auto;
      font-family: var(--mono);
      font-size: 0.65rem;
      color: var(--text-dim);
      flex-shrink: 0;
    }

    /* URL list */
    .url-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
      margin-bottom: 0.75rem;
    }

    .url-item {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      background: var(--bg);
      border: 1px solid transparent;
      border-radius: 4px;
      padding: 0.35rem 0.6rem;
      transition: border-color 0.15s;
      cursor: pointer;
    }

    .url-item:hover { border-color: var(--border); }
    .url-item.copied { border-color: var(--accent); }

    .proto {
      font-family: var(--mono);
      font-size: 0.6rem;
      font-weight: 500;
      padding: 0.1rem 0.35rem;
      border-radius: 3px;
      flex-shrink: 0;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    .proto.http  { background: var(--http-bg); color: var(--http-color); }
    .proto.https { background: var(--https-bg); color: var(--https-color); }

    .ssl-expect {
      font-family: var(--mono);
      font-size: 0.55rem;
      color: var(--text-dim);
      flex-shrink: 0;
      title: 'SSL error expected by design';
    }

    .ssl-expect svg {
      width: 12px;
      height: 12px;
      vertical-align: -2px;
      opacity: 0.5;
    }

    .url-text {
      font-family: var(--mono);
      font-size: 0.72rem;
      color: var(--text);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      flex: 1;
    }

    .copy-hint {
      font-family: var(--body);
      font-size: 0.6rem;
      color: var(--text-dim);
      opacity: 0;
      transition: opacity 0.15s;
      flex-shrink: 0;
      font-weight: 500;
      letter-spacing: 0.02em;
    }

    .url-item:hover .copy-hint { opacity: 1; }
    .url-item.copied .copy-hint { opacity: 1; color: var(--accent); }

    /* Expected response */
    .expected {
      display: flex;
      align-items: baseline;
      gap: 0.6rem;
      padding: 0.4rem 0;
    }

    .expected-label {
      font-family: var(--body);
      font-size: 0.65rem;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-weight: 600;
      flex-shrink: 0;
    }

    .expected-value {
      font-family: var(--mono);
      font-size: 0.68rem;
      color: var(--accent);
      word-break: break-all;
    }

    /* No results */
    #no-results {
      display: none;
      text-align: center;
      padding: 4rem 2rem;
      color: var(--text-dim);
      font-size: 0.9rem;
    }

    /* Footer */
    footer {
      border-top: 1px solid var(--border);
      text-align: center;
      padding: 1.5rem 2rem;
      font-size: 0.72rem;
      color: var(--text-dim);
      max-width: 1080px;
      margin: 0 auto;
    }

    footer strong {
      color: var(--text);
      font-weight: 500;
    }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      header { padding: 2rem 1.25rem 1.5rem; }
      .controls { padding: 1rem 1.25rem; }
      main { padding: 0 1.25rem; }
      .card { padding: 1rem 1.125rem; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-top">
    <h1>Captive Portal Checks</h1>
    <div class="stats">
      <div class="stat"><strong id="stat-vendors">&mdash;</strong> vendors</div>
      <div class="stat"><strong id="stat-urls">&mdash;</strong> URLs</div>
    </div>
  </div>
  <p class="subtitle">A reference of connectivity-check endpoints used by operating systems and browsers to detect captive portals.</p>
  <hr class="header-rule" />
</header>

<div class="controls">
  <div class="search-wrap">
    <svg width="15" height="15" viewBox="0 0 15 15" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><circle cx="6.5" cy="6.5" r="4.5"/><line x1="10" y1="10" x2="13.5" y2="13.5"/></svg>
    <input type="search" id="search" placeholder="Search vendors, platforms, URLs&hellip;" autocomplete="off" />
  </div>
  <div class="filter-chips" id="chips"></div>
</div>

<main>
  <div id="results-info"></div>
  <div class="card-list" id="grid">
    <div id="no-results">No matching entries found.</div>
  </div>
</main>

<footer>
  Click any URL to copy &middot; <strong>HTTP</strong> unencrypted &middot; <strong>HTTPS</strong> encrypted
</footer>

<script>
const DATA = {
  "captive_portal_check_urls": [
    {
      "vendor": "Microsoft",
      "os": "Windows",
      "urls": [
        "http://www.msftconnecttest.com/connecttest.txt",
        "https://www.msftconnecttest.com/connecttest.txt",
        "http://ipv6.msftconnecttest.com/connecttest.txt"
      ],
      "expected_response": "Microsoft Connect Test",
      "expect_ssl_error": true
    },
    {
      "vendor": "Apple",
      "os": "macOS / iOS / iPadOS",
      "urls": [
        "http://captive.apple.com/hotspot-detect.html",
        "https://captive.apple.com/hotspot-detect.html"
      ],
      "expected_response": "<HTML><HEAD><TITLE>Success</TITLE></HEAD><BODY>Success</BODY></HTML>",
      "expect_ssl_error": true
    },
    {
      "vendor": "Google",
      "os": "Android / ChromeOS",
      "urls": [
        "http://connectivitycheck.gstatic.com/generate_204",
        "http://connectivitycheck.android.com/generate_204",
        "http://www.gstatic.com/generate_204",
        "https://www.google.com/generate_204",
        "http://play.googleapis.com/generate_204",
        "http://clients1.google.com/generate_204",
        "http://clients3.google.com/generate_204"
      ],
      "expected_response": "HTTP 204 No Content"
    },
    {
      "vendor": "Mozilla",
      "os": "Firefox Browser",
      "urls": [
        "http://detectportal.firefox.com/success.txt",
        "https://detectportal.firefox.com/success.txt"
      ],
      "expected_response": "success"
    },
    {
      "vendor": "Mozilla",
      "os": "Firefox Browser (modern)",
      "urls": [
        "http://detectportal.firefox.com/canonical.html"
      ],
      "expected_response": "meta http-equiv=\"refresh\""
    },
    {
      "vendor": "Ubuntu / Canonical",
      "os": "Ubuntu Linux",
      "urls": [
        "http://connectivity-check.ubuntu.com/"
      ],
      "expected_response": "HTTP 204 No Content"
    },
    {
      "vendor": "KDE",
      "os": "Linux (KDE Plasma)",
      "urls": [
        "http://networkcheck.kde.org/"
      ],
      "expected_response": "OK"
    },
    {
      "vendor": "GNOME / NetworkManager",
      "os": "Linux (GNOME)",
      "urls": [
        "http://nmcheck.gnome.org/check_network_status.txt",
        "http://network-test.debian.org/nm"
      ],
      "expected_response": "NetworkManager is online"
    },
    {
      "vendor": "Fedora",
      "os": "Fedora Linux",
      "urls": [
        "http://fedoraproject.org/static/hotspot.txt"
      ],
      "expected_response": "OK"
    },
    {
      "vendor": "Curl / Generic",
      "os": "Cross-platform",
      "urls": [
        "http://example.com/",
        "http://httpforever.com/"
      ],
      "expected_response": "HTTP 200 OK with page content"
    },
    {
      "vendor": "Huawei",
      "os": "HarmonyOS / EMUI",
      "urls": [
        "http://connectivitycheck.platform.hicloud.com/generate_204"
      ],
      "expected_response": "HTTP 204 No Content"
    },
    {
      "vendor": "Xiaomi / MIUI",
      "os": "MIUI Android",
      "urls": [
        "http://connect.rom.miui.com/generate_204"
      ],
      "expected_response": "HTTP 204 No Content"
    },
    {
      "vendor": "Cloudflare",
      "os": "Cross-platform / WARP",
      "urls": [
        "http://cp.cloudflare.com/",
        "https://cp.cloudflare.com/"
      ],
      "expected_response": "HTTP 204 No Content"
    },
    {
      "vendor": "Microsoft Edge",
      "os": "Edge Browser",
      "urls": [
        "http://edge-http.microsoft.com/captiveportal/generate_204"
      ],
      "expected_response": "HTTP 204 No Content"
    },
    {
      "vendor": "Brave",
      "os": "Brave Browser",
      "urls": [
        "http://detectportal.brave-http-only.com/generate_204"
      ],
      "expected_response": "HTTP 204 No Content"
    }
  ]
};

const entries = DATA.captive_portal_check_urls;

// Stats
const totalUrls = entries.reduce((s, e) => s + e.urls.length, 0);
document.getElementById('stat-vendors').textContent = entries.length;
document.getElementById('stat-urls').textContent = totalUrls;

// Build filter chips
const osGroups = [...new Set(entries.map(e => {
  if (e.os.includes('Windows')) return 'Windows';
  if (e.os.includes('iOS') || e.os.includes('macOS')) return 'Apple';
  if (e.os.includes('Android') || e.os.includes('ChromeOS')) return 'Android';
  if (e.os.includes('Linux') || e.os.includes('GNOME') || e.os.includes('KDE') || e.os.includes('Ubuntu')) return 'Linux';
  if (e.os.includes('Cross')) return 'Cross-platform';
  return 'Other';
}))];

let activeFilter = null;

const chipsEl = document.getElementById('chips');
osGroups.forEach(group => {
  const chip = document.createElement('button');
  chip.className = 'chip';
  chip.textContent = group;
  chip.addEventListener('click', () => {
    if (activeFilter === group) {
      activeFilter = null;
      chip.classList.remove('active');
    } else {
      document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
      activeFilter = group;
      chip.classList.add('active');
    }
    render();
  });
  chipsEl.appendChild(chip);
});

function osToGroup(os) {
  if (os.includes('Windows')) return 'Windows';
  if (os.includes('iOS') || os.includes('macOS')) return 'Apple';
  if (os.includes('Android') || os.includes('ChromeOS')) return 'Android';
  if (os.includes('Linux') || os.includes('GNOME') || os.includes('KDE') || os.includes('Ubuntu')) return 'Linux';
  if (os.includes('Cross')) return 'Cross-platform';
  return 'Other';
}

function makeCard(entry, delay) {
  const card = document.createElement('div');
  card.className = 'card';
  card.style.animationDelay = `${delay * 40}ms`;

  const header = document.createElement('div');
  header.className = 'card-header';

  const vendorEl = document.createElement('span');
  vendorEl.className = 'card-vendor';
  vendorEl.textContent = entry.vendor;

  const osEl = document.createElement('span');
  osEl.className = 'card-os';
  osEl.textContent = entry.os;

  const countEl = document.createElement('span');
  countEl.className = 'url-count';
  countEl.textContent = `${entry.urls.length} URL${entry.urls.length !== 1 ? 's' : ''}`;

  header.append(vendorEl, osEl, countEl);

  const list = document.createElement('ul');
  list.className = 'url-list';

  entry.urls.forEach(url => {
    const li = document.createElement('li');
    li.className = 'url-item';
    li.title = 'Click to copy';

    const isHttps = url.startsWith('https');
    const proto = document.createElement('span');
    proto.className = `proto ${isHttps ? 'https' : 'http'}`;
    proto.textContent = isHttps ? 'HTTPS' : 'HTTP';

    const text = document.createElement('span');
    text.className = 'url-text';
    text.textContent = url.replace(/^https?:\/\//, '');

    const hint = document.createElement('span');
    hint.className = 'copy-hint';
    hint.textContent = 'copy';

    if (entry.expect_ssl_error && isHttps) {
      const ssl = document.createElement('span');
      ssl.className = 'ssl-expect';
      ssl.title = 'SSL error expected — used for captive portal detection';
      ssl.innerHTML = '<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><rect x="3" y="7" width="10" height="7" rx="1.5"/><path d="M5 7V5a3 3 0 0 1 6 0v2"/><line x1="2" y1="14" x2="14" y2="2"/></svg>';
      li.append(proto, text, ssl, hint);
    } else {
      li.append(proto, text, hint);
    }
    li.addEventListener('click', () => {
      navigator.clipboard.writeText(url).then(() => {
        li.classList.add('copied');
        hint.textContent = 'copied';
        setTimeout(() => {
          li.classList.remove('copied');
          hint.textContent = 'copy';
        }, 1500);
      });
    });

    list.appendChild(li);
  });

  const exp = document.createElement('div');
  exp.className = 'expected';
  exp.innerHTML = `<span class="expected-label">Expected</span><span class="expected-value">${escapeHtml(entry.expected_response)}</span>`;

  card.append(header, list, exp);
  return card;
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function render() {
  const query = document.getElementById('search').value.toLowerCase().trim();
  const grid = document.getElementById('grid');
  const noRes = document.getElementById('no-results');

  [...grid.querySelectorAll('.card')].forEach(c => c.remove());

  const filtered = entries.filter(e => {
    const groupMatch = !activeFilter || osToGroup(e.os) === activeFilter;
    const queryMatch = !query ||
      e.vendor.toLowerCase().includes(query) ||
      e.os.toLowerCase().includes(query) ||
      e.urls.some(u => u.toLowerCase().includes(query)) ||
      e.expected_response.toLowerCase().includes(query);
    return groupMatch && queryMatch;
  });

  const urlCount = filtered.reduce((s, e) => s + e.urls.length, 0);
  const info = document.getElementById('results-info');
  if (query || activeFilter) {
    info.textContent = `Showing ${filtered.length} vendor${filtered.length !== 1 ? 's' : ''}, ${urlCount} URLs`;
  } else {
    info.textContent = '';
  }

  if (filtered.length === 0) {
    noRes.style.display = 'block';
  } else {
    noRes.style.display = 'none';
    filtered.forEach((entry, i) => {
      grid.appendChild(makeCard(entry, i));
    });
  }
}

document.getElementById('search').addEventListener('input', render);

render();
</script>
</body>
</html>
